name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    uses: slice-soft/ss-pipeline/.github/workflows/create-release.yml@v0
    secrets: inherit

  goreleaser:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    uses: slice-soft/ss-pipeline/.github/workflows/release-cli.yml@v0
    with:
      tag_name: ${{ needs.release.outputs.tag_name }}
      go-version: "1.25"
    secrets: inherit
